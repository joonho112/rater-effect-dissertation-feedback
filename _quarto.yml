project:
  type: book
  output-dir: _book
  execute-dir: project

book:
  title: "Methodological Notes on Two Rater-Effect Simulation Studies"
  subtitle: "Methodological feedback on a doctoral student's dissertation — research notes toward a journal manuscript"
  author:
    - name: "JoonHo Lee"
      email: "jlee296@ua.edu"
      affiliation: "University of Alabama"
  date: today
  date-format: "MMMM YYYY"
  language: en
  search: true
  reader-mode: true
  sidebar:
    style: docked
    search: true
    collapse-level: 1
  page-navigation: true
  back-to-top-navigation: true
  chapters:
    - index.qmd
    - 00-executive-summary.qmd
    - part: "Part I — The critical issues"
      chapters:
        - 01-psi-not-identified.qmd
        - 02-location-collapse.qmd
        - 03-misfit-is-noise.qmd
        - 04-mcmc-too-short.qmd
        - 05-what-is-sensitivity.qmd
        - 06-marginal-vs-residual.qmd
    - part: "Part II — Additional concerns & the path forward"
      chapters:
        - 07-additional-concerns.qmd
        - 08-revision-roadmap.qmd
  appendices:
    - 99-reproducibility.qmd
  page-footer:
    left: "Methodological Notes on Two Rater-Effect Simulation Studies"
    right: "Built with Quarto"

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    toc-depth: 3
    toc-title: "On this page"
    number-sections: true
    number-depth: 3
    code-fold: true
    code-summary: "Show the R code"
    code-tools: true
    code-overflow: wrap
    fig-cap-location: bottom
    tbl-cap-location: top
    fig-align: center
    fig-width: 7
    fig-height: 4.5
    fig-dpi: 150
    smooth-scroll: true
    anchor-sections: true
    citations-hover: true
    crossrefs-hover: true
    html-math-method: mathjax

execute:
  echo: true
  warning: false
  message: false
  freeze: auto

knitr:
  opts_chunk:
    comment: "#>"
    collapse: false
    fig.align: center
    out.width: "100%"
